name: trigger_lava
on:
  workflow_call:
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches:
      - master
      - temp
    paths-ignore:
      - '.github/**'

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  trigger_tests:
    runs-on: ubuntu-latest
    uses: Audioreach/audioreach-workflows/.github/workflows/test.yml@temp
    secrets: inherit
    with:
      build_matrix: ${{ inputs.build_matrix }}
