---
name: pre_merge_build
run-name: ${{ github.event.pull_request.number && 'Pre Merge Build PR:' || 'Pre Merge Build:' }}${{ github.event.pull_request.number || github.run_number }}

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - master
      - temp
    paths-ignore:
      - '.github/**'

jobs:
  load_parameters:
    uses: Audioreach/audioreach-workflows/.github/workflows/loading.yml@temp
    with:
      event_name: ${{ github.event_name }}
      pr_ref: ${{ github.event.pull_request.head.ref }}
      pr_repo: ${{ github.event.pull_request.head.repo.full_name }}

  build:
    needs: load_parameters
    uses: Audioreach/audioreach-workflows/.github/workflows/build.yml@temp
    secrets: inherit
    with:
      build_args: ${{ needs.load_parameters.outputs.build_args }}
      build_matrix: ${{ needs.load_parameters.outputs.build_matrix }}
      event_name: ${{ github.event_name }}
      pr_ref: ${{ github.event.pull_request.head.ref }}
      pr_repo: ${{ github.event.pull_request.head.repo.full_name }}

  process_image:
    needs: [ load_parameters, build ]
    uses: Audioreach/audioreach-workflows/.github/workflows/process_image.yml@temp
    secrets: inherit
    with:
      event_name: ${{ github.event_name }}
      build_matrix: ${{ needs.load_parameters.outputs.build_matrix }}
      pr_ref: ${{ github.event.pull_request.head.ref }}
      pr_repo: ${{ github.event.pull_request.head.repo.full_name }}

  filter_test_matrix:
    needs: load_parameters
    runs-on: ubuntu-latest
    outputs:
      test_matrix: ${{ steps.filter.outputs.test_matrix }}
    steps:
      - id: filter
        shell: bash
        run: |
            MATRIX='${{ needs.load_parameters.outputs.build_matrix }}'

            echo "RAW build_matrix:"
            echo "$MATRIX"

            echo "Validating JSON..."
            echo "$MATRIX" | jq . >/dev/null

            FILTERED=$(
              echo "$MATRIX" | jq -c '
                if type == "object" then
                  to_entries
                  | map(select(.value.testing_enabled == true))
                  | from_entries
                elif type == "array" then
                  map(select(.testing_enabled == true))
                else
                  error("Unsupported build_matrix JSON type: " + (type|tostring))
                end
              '
            )

            echo "Filtered matrix (pretty):"
            echo "$FILTERED" | jq .

            echo "$FILTERED" > test_matrix.json
            echo "test_matrix=$FILTERED" >> "$GITHUB_OUTPUT"

      - name: Upload test matrix
        uses: actions/upload-artifact@v4
        with:
          name: test-matrix
          path: test_matrix.json
      name: trigger_lava

run-name: >
  Pre Merge Build (trigger_lava) –
  Run #${{ github.event.workflow_run.run_number }}

on:
  workflow_run:
    workflows:
      - pre_merge_build
    types:
      - completed

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  prepare_matrix:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    outputs:
      test_matrix: ${{ steps.matrix.outputs.test_matrix }}

    steps:
      - name: Download test matrix artifact
        uses: actions/download-artifact@v4
        with:
          name: test-matrix
          run-id: ${{ github.event.workflow_run.id }}

      - name: Read test matrix
        id: matrix
        shell: bash
        run: |
          if [ ! -f test_matrix.json ]; then
            echo "❌ test_matrix.json not found"
            exit 1
          fi

          MATRIX=$(cat test_matrix.json)

          echo "Final test matrix:"
          echo "$MATRIX" | jq .

          echo "test_matrix=$MATRIX" >> "$GITHUB_OUTPUT"

    trigger_lava:
      needs: prepare_matrix
      uses: .github/workflows/trigger_lava.yml@temp
      with:
        build_matrix: ${{ needs.prepare_matrix.outputs.test_matrix }}
        
